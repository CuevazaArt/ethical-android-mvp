# Example external profile bundle (documentation only).
#
# Today, nominal bundles live in code: src/runtime_profiles.py (ETHOS_RUNTIME_PROFILE).
# A future loader could merge YAML like this when ETHOS_PROFILE_FILE is set; until then,
# copy keys into your process environment or contribute a loader + tests.
#
# validate:  python -m src.cli check-config --strict

profiles:
  perception_adv_consensus_lab:
    KERNEL_PERCEPTION_DUAL_VOTE: "1"
    KERNEL_PERCEPTION_UNCERTAINTY_DELIB: "1"
    KERNEL_PERCEPTION_UNCERTAINTY_MIN: "0.35"
    KERNEL_PERCEPTION_DUAL_DISCREPANCY_MIN: "0.3"
    KERNEL_PERCEPTION_DUAL_TEMP_SECOND: "0.82"
