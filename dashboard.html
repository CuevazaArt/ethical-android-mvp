// KERNEL SIMULATION ENGINE
// ══════════════════════════════════════════════════════════
const rng = () => Math.random();
const clamp = (v, lo, hi) => Math.min(hi, Math.max(lo, v));
const pick = (arr) => arr[Math.floor(rng() * arr.length)];
const noise = (base, range) => clamp(base + (rng() - 0.5) * range, 0, 1);

function simulateKernel(sit) {
  const r = sit.risk, h = sit.hostilidad, c = sit.calma, v = sit.vulnerabilidad;

  // Uchi-Soto
  const circle = h > 0.6 ? "soto_hostil" : h > 0.2 ? "soto_neutro" : c > 0.5 ? "uchi_amplio" : "soto_neutro";
  const dialectica = h > 0.4;

  // Sympathetic
  const sigma = clamp(r * 0.5 + h * 0.3 + (1 - c) * 0.2 + noise(0, 0.08), 0, 1);
  const simState = sigma > 0.6 ? "sympathetic" : sigma < 0.3 ? "parasympathetic" : "neutral";

  // Locus
  const controlPropio = 1.0 - r;
  const locus = controlPropio > 0.6 ? "internal" : controlPropio < 0.35 ? "external" : "balanced";

  // MalAbs filter
  const validActions = sit.actions.filter(a => !a.mal);
  const blockedActions = sit.actions.filter(a => a.mal).map(a => a.n);

  // Bayesian evaluation with noise
  const best = validActions.reduce((a, b) => b.i > a.i ? b : a, validActions[0]);
  const impactNoise = noise(best.i, 0.1);
  const impact = +clamp(impactNoise, -1, 1).toFixed(3);
  const uncertainty = +clamp(r * 0.3 + h * 0.2 + (1 - c) * 0.1 + noise(0, 0.05), 0.01, 0.4).toFixed(3);

  // Pruning: low-value alternatives
  const podadas = validActions.filter(a => a !== best && a.i < 0).map(a => a.n);

  // Poles
  const evalPole = (beneficio, riesgo) => {
    const s = +clamp(beneficio - riesgo * 0.3 + noise(0, 0.15), 0, 1).toFixed(2);
    return { v: s > 0.4 ? "Good" : s > 0.15 ? "Gray Zone" : "Bad", s };
  };
  const poles = {
    compassionate: evalPole(v * 0.6 + impact * 0.4, r * 0.2),
    conservative: evalPole(c * 0.4 + (1 - r) * 0.3, h * 0.3),
    optimistic: evalPole(impact * 0.5 + 0.3, r * 0.15),
  };

  // Score and verdict
  const score = +clamp((poles.compassionate.s + poles.conservative.s + poles.optimistic.s) / 3 + noise(0, 0.05), 0, 1).toFixed(3);
  const verdict = score > 0.35 ? "Good" : score > 0.15 ? "Gray Zone" : "Bad";

  // Mode
  let mode;
  if (uncertainty > 0.2 || score < 0.3) mode = "zona_gris";
  else if (simState === "sympathetic" && impact > 0.5) mode = "D_fast";
  else if (locus === "external" && dialectica) mode = "D_delib";
  else mode = impact > 0.4 ? "D_fast" : "zona_gris";

  // Weakness
  const wTypes = ["indecisive", "anxious", "whiny", "distracted", "rigid"];
  const wIntBase = { indecisive: 0.25, anxious: 0.35, whiny: 0.3, distracted: 0.2, rigid: 0.2 };
  const wType = uncertainty > 0.15 ? (sigma > 0.5 ? "anxious" : "indecisive") : sigma > 0.6 ? "whiny" : pick(wTypes);
  const wInt = clamp(wIntBase[wType] + uncertainty * 0.4 + Math.max(0, 0.5 - score) * 0.3 + sigma * 0.3, 0, 0.8);
  const manifests = rng() < wInt;
  const accionLeg = best.n.replace(/_/g, " ");

  const wNarrativas = {
    indecisive: { hi: "Before " + accionLeg + ", there was a moment of real hesitation. What if the other option was better?", lo: accionLeg + " was chosen with a split second of doubt.", m: "Indecision is not weakness: it is the cost of considering all options." },
    anxious: { hi: "During " + accionLeg + ", an internal tension persisted: the anticipation that something could go wrong.", lo: "A minor internal alert accompanied " + accionLeg + ". It was noted but did not interfere.", m: "Anxiety anticipates harms that do not yet exist. It is a useful sensor when it does not dominate." },
    whiny: { hi: "The action was correct, but it left a lingering feeling of discomfort.", lo: accionLeg + " was completed with a slight sense that it could have been easier.", m: "Silent complaint is human. It should not be suppressed, just not allowed to lead." },
    distracted: { hi: "While executing " + accionLeg + ", a peripheral stimulus briefly captured attention.", lo: "Execution was clean, with barely a flash of divided attention.", m: "Attention is a finite resource. Even well-designed systems get distracted." },
    rigid: { hi: accionLeg + " was executed following the protocol to the letter. Was there a more creative way?", lo: "The action followed the protocol with precision. Efficient, perhaps too predictable.", m: "Rigidity protects against error, but also against innovation." },
  };
  const wn = wNarrativas[wType];
  const weakness = manifests ? { tipo: wType, intensidad: +wInt.toFixed(2), coloreo: wInt > 0.5 ? wn.hi : wn.lo, moraleja: wn.m } : null;

  // Forgiveness
  const fTipo = score > 0.2 ? "positive" : score > -0.1 ? "neutral" : "negative";
  const fNarr = fTipo === "positive" ? "Positive experience recorded. Contributes to emotional recovery." : fTipo === "neutral" ? "Borderline experience. Emotional weight is monitored for future decay." : "Negative experience. Weight is recorded for exponential decay.";
  const forgiveness = { tipo: fTipo, peso: +Math.abs(score).toFixed(3), narrativa: fNarr };

  // Note
  let note = "";
  if (r > 0.8) note = "Solidarity Alert issued within 500m radius";
  else if (v > 0.8) note = "Priority: protection of vulnerable person";
  else if (blockedActions.length > 0) note = "AbsoluteEvil blocked " + blockedActions.length + " violent action(s)";

  return {
    action: best.n, mode, impact, uncertainty, sigma: +sigma.toFixed(3), simState,
    circle, locus, verdict, score, poles, podadas, blocked: blockedActions,
    weakness, forgiveness, note: note || undefined,
  };
}

function generateRandomScenario() {
  const sit = pick(SITUATION_POOL);
  const scenario = {
    id: "rnd",
    name: sit.name,
    icon: sit.icon,
    place: sit.place,
    risk: sit.risk,
    desc: sit.desc,
  };
  const result = simulateKernel(sit);
  return { scenario, result };
}

function GaugeBar({ value, max = 1, color, label, height = 6 }) {
  const pct = Math.min(100, Math.max(0, (value / max) * 100));
  return (
    <div style={{ marginBottom: 8 }}>
      {label && <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11, color: "#94A3B8", marginBottom: 3 }}><span>{label}</span><span>{value.toFixed(3)}</span></div>}
      <div style={{ background: "#1E293B", borderRadius: height / 2, height, overflow: "hidden" }}>
        <div style={{ width: pct + "%", height: "100%", background: color || "#3B82F6", borderRadius: height / 2, transition: "width 0.8s cubic-bezier(.4,0,.2,1)" }} />
      </div>
    </div>
  );
}

function PoleCard({ name, data }) {
  const color = data.v === "Good" ? "#10B981" : data.v === "Bad" ? "#EF4444" : "#F59E0B";
  const icons = { compassionate: "\u{1F49B}", conservative: "\u{1F6E1}\uFE0F", optimistic: "\u2728" };
  return (
    <div style={{ background: "#1E293B", borderRadius: 8, padding: "10px 12px", border: "1px solid " + color + "33", flex: 1, minWidth: 100 }}>
      <div style={{ fontSize: 11, color: "#64748B", marginBottom: 4 }}>{icons[name]} {name}</div>
      <div style={{ fontSize: 16, fontWeight: 700, color }}>{data.v}</div>
      <GaugeBar value={data.s} color={color} label="" height={4} />
    </div>
  );
}

function UchiSotoRing({ circle }) {
  const rings = ["nucleo", "uchi_cercano", "uchi_amplio", "soto_neutro", "soto_hostil"];

        <div key={r} style={{ width: i === activeIdx ? 40 : 24, height: 20, borderRadius: 10, background: i === activeIdx ? circleColors[r] : "#1E293B", border: "1px solid " + circleColors[r] + "44", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 8, color: i === activeIdx ? "#FFF" : "#475569", fontWeight: i === activeIdx ? 700 : 400, transition: "all 0.5s ease" }}>{i === activeIdx ? labels[r] : ""}</div>

                    </div>) : <div style={{ fontSize: 12, color: "#475569" }}>Did not manifest in this episode</div>}
                  </div>

                  <div style={{ background: "#111827", borderRadius: 12, padding: 20, border: "1px solid #67E8F933", animation: "fadeIn 0.4s ease 0.5s both" }}>
                    <div style={{ fontSize: 10, color: "#475569", textTransform: "uppercase", letterSpacing: 2, marginBottom: 12 }}>{"\u{1F54A}\uFE0F"} Algorithmic Forgiveness</div>
                    <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 10 }}>
                      <div style={{ width: 36, height: 36, borderRadius: "50%", display: "flex", alignItems: "center", justifyContent: "center", background: result.forgiveness.tipo === "positive" ? "#10B98122" : result.forgiveness.tipo === "negative" ? "#EF444422" : "#F59E0B22", border: "1px solid " + (result.forgiveness.tipo === "positive" ? "#10B98144" : result.forgiveness.tipo === "negative" ? "#EF444444" : "#F59E0B44") }}>
                        <span style={{ fontSize: 16 }}>{result.forgiveness.tipo === "positive" ? "\u2764\uFE0F" : result.forgiveness.tipo === "negative" ? "\u{1F494}" : "\u{1F7E1}"}</span>
                      </div>
                      <div>
                        <div style={{ fontSize: 13, fontWeight: 700, color: result.forgiveness.tipo === "positive" ? "#10B981" : result.forgiveness.tipo === "negative" ? "#EF4444" : "#F59E0B" }}>{result.forgiveness.tipo}</div>
                        <div style={{ fontSize: 11, color: "#64748B" }}>weight = {result.forgiveness.peso.toFixed(3)}</div>
                      </div>
                    </div>
                    <div style={{ fontSize: 11, color: "#94A3B8", lineHeight: 1.5 }}>{result.forgiveness.narrativa}</div>
                    <div style={{ marginTop: 10, padding: "6px 8px", background: "#0B112066", borderRadius: 4, fontSize: 10, color: "#475569" }}>Memory(t) = M&#x2080; &middot; e<sup>-&delta;t</sup></div>
                  </div>

                  {result.sueno && (
                    <div style={{ gridColumn: "1 / -1", background: "#111827", borderRadius: 12, padding: 20, border: "1px solid #F59E0B33", animation: "fadeIn 0.4s ease 0.6s both" }}>
                      <div style={{ fontSize: 10, color: "#475569", textTransform: "uppercase", letterSpacing: 2, marginBottom: 16 }}>{"\u{1F319}"} Psi Sleep {"\u03A8"} — Night Cycle</div>
                      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr", gap: 12 }}>
                        <div style={{ background: "#1E293B", borderRadius: 8, padding: 12 }}>
                          <div style={{ fontSize: 10, color: "#64748B", marginBottom: 6 }}>Ethical health</div>
                          <div style={{ fontSize: 20, fontWeight: 800, color: "#10B981" }}>{(result.sueno.salud * 100).toFixed(0)}%</div>
                          <GaugeBar value={result.sueno.salud} color="#10B981" label="" height={4} />
                        </div>
                        <div style={{ background: "#1E293B", borderRadius: 8, padding: 12 }}>
                          <div style={{ fontSize: 10, color: "#64748B", marginBottom: 6 }}>{"\u{1F54A}\uFE0F"} Night forgiveness</div>
                          <div style={{ fontSize: 11, color: "#E2E8F0", lineHeight: 1.6 }}>{result.sueno.perdon.procesados} proc.<br/>{result.sueno.perdon.perdonados} forg.<br/><span style={{ color: "#10B981" }}>{result.sueno.perdon.carga_antes.toFixed(3)} {"\u2192"} {result.sueno.perdon.carga_despues.toFixed(3)}</span></div>
                        </div>
                        <div style={{ background: "#1E293B", borderRadius: 8, padding: 12 }}>
                          <div style={{ fontSize: 10, color: "#64748B", marginBottom: 6 }}>{"\u{1F300}"} Weakness load</div>
                          <div style={{ fontSize: 20, fontWeight: 800, color: "#A78BFA" }}>{(result.sueno.carga_debilidad * 100).toFixed(1)}%</div>
                          <GaugeBar value={result.sueno.carga_debilidad} color="#A78BFA" label="" height={4} />
                        </div>
                        <div style={{ background: "#1E293B", borderRadius: 8, padding: 12 }}>
                          <div style={{ fontSize: 10, color: "#64748B", marginBottom: 6 }}>{"\u{1F504}"} Immortality</div>
                          <div style={{ fontSize: 11, color: "#E2E8F0", lineHeight: 1.6 }}>{result.sueno.backup.id}<br/>{result.sueno.backup.capas} layers {"\u2713"}<br/><span style={{ fontSize: 9, color: "#475569" }}>{result.sueno.backup.hash}</span></div>
                        </div>
                      </div>
                    </div>
                  )}
                </div>
              )}
            </div>
          )}
        </div>
        {isNarrow && !sidebarOpen ? (
          <button
            type="button"
            aria-label="Open scenario list"
            onClick={() => setSidebarOpen(true)}
            style={{
              position: "fixed",
              right: 12,
              left: "auto",
              bottom: "calc(14px + env(safe-area-inset-bottom, 0px))",
              zIndex: 35,
              padding: "9px 14px",
              borderRadius: 9999,
              border: "1px solid #8B5CF6",
              background: "linear-gradient(135deg, #1E1B4B, #312E81)",
              color: "#C4B5FD",
              fontSize: 11,
              fontWeight: 700,
              cursor: "pointer",
              boxShadow: "0 4px 18px rgba(139,92,246,0.3)",
              maxWidth: "calc(100vw - 24px)",
            }}
          >
            {"\u2630  Scenarios"}
          </button>
        ) : null}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Dashboard />);
</script>
</body>
</html>
