<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- Essential for PWA and Mobile-First: prevent scaling to keep app-like feel -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- Theme color for the browser's address bar and OS UI -->
    <meta name="theme-color" content="#0F172A">
    <!-- Cache-Busting: ensure LAN deployments pick up the latest kernels -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Ethos Nomad Bridge</title>
    
    <!-- Bloque 22.1: system stack only (no CDN) for flaky LAN / field hardware -->
    <link rel="stylesheet" href="style.css?v=22.0.2">
    <!-- PWA Manifest stub (for Copilot to complete later) -->
    <link rel="manifest" href="manifest.json">
</head>
<body class="nomad-text-focus">
    <!-- Dynamic animated gradient background -->
    <div class="mesh-background" id="mesh-bg"></div>

    <!-- Main Container -->
    <main class="app-container">
        
        <!-- Header / Telemetry Section -->
        <header class="top-bar glass-panel">
            <div class="status-indicator">
                <span class="status-dot" id="socket-status"></span>
                <span class="status-text" id="socket-text">Disconnected</span>
            </div>
            <button type="button" id="btn-ui-mode" class="glass-btn small ui-mode-toggle" title="Toggle full sensory UI">Full UI</button>
            <div class="ethical-pulse" id="ethical-heartbeat"></div>
            <div class="telemetry">
                <span id="battery-level">--%</span> <span class="telemetry-icon">🔋</span>
                <div style="font-size: 0.5rem; opacity: 0.5; margin-top: 2px;">v22.0.2</div>
            </div>
        </header>

        <section id="identity-strip" class="identity-strip glass-panel" hidden aria-live="polite"></section>

        <!-- Center Orb / Emotional Anchor -->
        <section class="orb-container">
            <div class="affect-orb" id="affect-orb">
                <!-- Hidden video element for canvas capture (Cursor's Domain F.2) -->
                <video id="hidden-video" autoplay playsinline muted></video>
                <div class="orb-glow"></div>
            </div>
        </section>

        <!-- Dialogue / Sentiment Output (Chat Mode) -->
        <section class="chat-container glass-panel">
            <div id="chat-history" class="chat-history">
                <p id="charm-transcript" class="transcript placeholder">Esperando inicialización sensorial...</p>
            </div>
            <div class="chat-input-area">
                <input type="text" id="chat-input" placeholder="Escribe un mensaje de campo..." disabled>
                <button id="btn-send" class="glass-btn primary" disabled>Enviar</button>
            </div>
        </section>

        <!-- Control Bar (Compact) -->
        <footer class="bottom-controls">
            <!-- Telemetry Grid (New) -->
            <div class="telemetry-grid glass-panel">
                <div class="telemetry-item"><span>BT:</span><span id="tel-bat">--</span></div>
                <div class="telemetry-item"><span>TH:</span><span id="tel-temp">--</span></div>
                <div class="telemetry-item"><span>KN:</span><span id="tel-kin">0.0</span></div>
                <div class="telemetry-item"><span>AU:</span><span id="tel-aud">0.0</span></div>
            </div>

            <!-- Chat Entry (New) -->
            <div class="chat-entry-container glass-panel">
                <input type="text" id="chat-input" placeholder="Message Kernel..." autocomplete="off">
                <button id="btn-send">SEND</button>
            </div>

            <div class="btn-row">
                <button id="btn-connect" class="glass-btn primary small">CONNECT</button>
                <button id="btn-stream" class="glass-btn inactive small" disabled>STREAM</button>
            </div>
        </footer>

    </main>

    <script src="media_engine.js?v=22.0.2"></script>
    <script src="app.js?v=22.0.2"></script>
</body>
</html>
