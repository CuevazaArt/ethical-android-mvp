<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ethos Kernel - Chat V2</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 2rem auto; padding: 0 1rem; }
        #chat-log { height: 400px; overflow-y: auto; border: 1px solid #ccc; padding: 1rem; margin-bottom: 1rem; border-radius: 4px; }
        .message { margin-bottom: 1rem; }
        .user-msg { color: #333; font-weight: bold; }
        .kernel-msg { color: #0056b3; }
        .blocked-msg { color: #d32f2f; }
        .context-tag { font-size: 0.8em; color: #888; margin-left: 0.5rem; }
        .typing { color: #999; font-style: italic; }
        textarea { width: 100%; height: 60px; margin-bottom: 0.5rem; padding: 0.5rem; box-sizing: border-box; }
        button { padding: 0.5rem 1rem; cursor: pointer; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .audio-panel { margin: 1rem 0; border: 1px solid #ddd; border-radius: 6px; padding: 0.75rem; }
        .audio-panel h3 { margin: 0 0 0.5rem; font-size: 0.95rem; }
        .audio-panel p { margin: 0.2rem 0; font-size: 0.85rem; color: #555; }
        .audio-row { display: flex; gap: 0.5rem; align-items: center; margin-top: 0.5rem; }
        .audio-row button { padding: 0.4rem 0.8rem; }
        .audio-status-ok { color: #1b5e20; }
        .audio-status-warn { color: #b26a00; }
        .audio-status-err { color: #b71c1c; }
        .vision-box { margin: 1rem 0; border: 1px solid #ddd; border-radius: 6px; padding: 0.75rem; }
        .vision-box h3 { margin: 0 0 0.5rem; font-size: 0.95rem; }
        .vision-row { display: flex; gap: 0.8rem; font-size: 0.85rem; margin-top: 0.5rem; }
        .vision-value { font-weight: 700; color: #0056b3; }
        #camera-preview { width: 100%; max-height: 140px; object-fit: cover; border-radius: 4px; margin-top: 0.6rem; display: none; }
        #vision-error { margin-top: 0.4rem; font-size: 0.82rem; color: #b71c1c; min-height: 1rem; }
    </style>
</head>
<body>
    <h1>Ethos Kernel - Terminal WS</h1>
    <div id="chat-log"></div>
    <textarea id="msg-input" placeholder="Escribe un mensaje..."></textarea>
    <button id="send-btn">Enviar</button>
    <div class="audio-panel">
        <h3>Audio Perception (Desktop Slice)</h3>
        <p id="audio-device-status" class="audio-status-warn">Mic: checking...</p>
        <p id="audio-last-result">Last transcript: -</p>
        <p id="audio-last-latency">Last latency_ms: -</p>
        <div class="audio-row">
            <button id="audio-capture-btn">Capture 1.2s and Send</button>
            <button id="audio-fallback-btn">Send Fallback (No Mic)</button>
        </div>
    </div>
    <div class="vision-box">
        <h3>Video Perception (Desktop Slice)</h3>
        <button id="camera-btn">Iniciar cámara</button>
        <div class="vision-row">
            <div>Motion: <span class="vision-value" id="vision-motion">0.00</span></div>
            <div>Faces: <span class="vision-value" id="vision-faces">0</span></div>
            <div>Status: <span class="vision-value" id="vision-status">idle</span></div>
        </div>
        <div id="vision-error"></div>
        <video id="camera-preview" autoplay muted playsinline></video>
        <canvas id="camera-canvas" width="320" height="240" style="display:none;"></canvas>
    </div>

    <script>
        const log = document.getElementById('chat-log');
        const input = document.getElementById('msg-input');
        const btn = document.getElementById('send-btn');
        const audioCaptureBtn = document.getElementById('audio-capture-btn');
        const audioFallbackBtn = document.getElementById('audio-fallback-btn');
        const audioDeviceStatus = document.getElementById('audio-device-status');
        const audioLastResult = document.getElementById('audio-last-result');
        const audioLastLatency = document.getElementById('audio-last-latency');
        const cameraBtn = document.getElementById('camera-btn');
        const visionMotionEl = document.getElementById('vision-motion');
        const visionFacesEl = document.getElementById('vision-faces');
        const visionStatusEl = document.getElementById('vision-status');
        const visionErrorEl = document.getElementById('vision-error');
        const cameraPreview = document.getElementById('camera-preview');
        const cameraCanvas = document.getElementById('camera-canvas');
        const cameraCtx = cameraCanvas.getContext('2d');
        
        let ws;
        let currentMsgEl = null;
        let streaming = false;
        let audioContext = null;
        let audioSource = null;
        let audioProcessor = null;
        let audioGainNode = null;
        let micReady = false;
        let micUnavailable = false;
        let captureActive = false;
        let recordedChunks = [];
        let cameraStream = null;
        let cameraInterval = null;

        function updateMicStatus(text, cssClass) {
            audioDeviceStatus.textContent = `Mic: ${text}`;
            audioDeviceStatus.className = cssClass;
        }

        async function initMic() {
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                micUnavailable = true;
                updateMicStatus('browser does not expose microphone API', 'audio-status-err');
                audioCaptureBtn.disabled = true;
                return;
            }

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                audioSource = audioContext.createMediaStreamSource(stream);
                audioProcessor = audioContext.createScriptProcessor(4096, 1, 1);
                audioGainNode = audioContext.createGain();
                audioGainNode.gain.value = 0;

                audioProcessor.onaudioprocess = (event) => {
                    if (!captureActive) {
                        return;
                    }
                    const inputCh = event.inputBuffer.getChannelData(0);
                    recordedChunks.push(new Float32Array(inputCh));
                };

                audioSource.connect(audioProcessor);
                audioProcessor.connect(audioGainNode);
                audioGainNode.connect(audioContext.destination);

                micReady = true;
                micUnavailable = false;
                updateMicStatus(`ready (${Math.round(audioContext.sampleRate)}Hz)`, 'audio-status-ok');
            } catch (error) {
                micReady = false;
                micUnavailable = true;
                updateMicStatus('unavailable (permission denied or no device)', 'audio-status-err');
                audioCaptureBtn.disabled = true;
            }
        }

        function mergeChunksToInt16(chunks) {
            let total = 0;
            for (const chunk of chunks) {
                total += chunk.length;
            }
            const pcm = new Int16Array(total);
            let offset = 0;
            for (const chunk of chunks) {
                for (let i = 0; i < chunk.length; i += 1) {
                    const clamped = Math.max(-1, Math.min(1, chunk[i]));
                    pcm[offset++] = clamped < 0 ? clamped * 32768 : clamped * 32767;
                }
            }
            return pcm;
        }

        function int16ToBase64(int16Array) {
            const bytes = new Uint8Array(int16Array.buffer);
            let binary = '';
            const chunkSize = 0x8000;
            for (let i = 0; i < bytes.length; i += chunkSize) {
                const slice = bytes.subarray(i, i + chunkSize);
                binary += String.fromCharCode(...slice);
            }
            return btoa(binary);
        }

        async function sendAudioPerceptionEnvelope(audioB64, sampleRateHz) {
            const envelope = {
                version: '1.0',
                contract: 'audio_perception',
                request: {
                    audio_b64: audioB64,
                    sample_rate_hz: sampleRateHz
                },
                response: {},
                error: null,
                latency_ms: 0
            };

            const resp = await fetch('/api/perception/audio', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(envelope)
            });
            const data = await resp.json();

            const latency = Number.isFinite(Number(data.latency_ms)) ? Number(data.latency_ms).toFixed(2) : '-';
            audioLastLatency.textContent = `Last latency_ms: ${latency}`;

            if (data.error) {
                audioLastResult.textContent = `Last transcript: fallback -> ${data.error.code} (${data.error.message})`;
                log.innerHTML += `<div class="message blocked-msg"><strong>Audio:</strong> ${data.error.code} - ${data.error.message}</div>`;
            } else {
                const transcript = data.response?.transcript || '(empty transcript)';
                audioLastResult.textContent = `Last transcript: ${transcript}`;
                log.innerHTML += `<div class="message kernel-msg"><strong>Audio transcript:</strong> ${transcript} <span class="context-tag">[${latency}ms]</span></div>`;
            }
            log.scrollTop = log.scrollHeight;
        }

        async function captureAndSendAudio() {
            if (!micReady || micUnavailable) {
                updateMicStatus('not ready (using fallback)', 'audio-status-warn');
                await sendAudioPerceptionEnvelope('', 16000);
                return;
            }
            if (captureActive) {
                return;
            }

            captureActive = true;
            recordedChunks = [];
            audioCaptureBtn.disabled = true;
            updateMicStatus('capturing...', 'audio-status-warn');

            await new Promise((resolve) => setTimeout(resolve, 1200));
            captureActive = false;

            const pcm = mergeChunksToInt16(recordedChunks);
            const sampleRate = Math.round(audioContext?.sampleRate || 16000);
            const b64 = int16ToBase64(pcm);

            await sendAudioPerceptionEnvelope(b64, sampleRate);

            updateMicStatus(`ready (${sampleRate}Hz)`, 'audio-status-ok');
            audioCaptureBtn.disabled = false;
        }

        function updateVisionState(payload) {
            if (!payload || typeof payload !== 'object') {
                return;
            }
            const motion = Number(payload.motion);
            const faces = Number(payload.faces_detected);
            if (!Number.isFinite(motion) || !Number.isFinite(faces)) {
                visionStatusEl.textContent = 'rejected';
                visionErrorEl.textContent = 'non-finite metrics rejected';
                return;
            }
            visionMotionEl.textContent = motion.toFixed(2);
            visionFacesEl.textContent = String(Math.max(0, Math.floor(faces)));
            visionStatusEl.textContent = 'ok';
            visionErrorEl.textContent = '';
        }

        function stopDesktopCamera() {
            if (cameraInterval) {
                clearInterval(cameraInterval);
                cameraInterval = null;
            }
            if (cameraStream) {
                for (const track of cameraStream.getTracks()) {
                    track.stop();
                }
                cameraStream = null;
            }
            cameraPreview.style.display = 'none';
            cameraBtn.textContent = 'Iniciar cámara';
            if (visionStatusEl.textContent !== 'rejected') {
                visionStatusEl.textContent = 'idle';
            }
        }

        async function startDesktopCamera() {
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                visionStatusEl.textContent = 'error';
                visionErrorEl.textContent = 'browser has no camera API';
                return;
            }
            try {
                cameraStream = await navigator.mediaDevices.getUserMedia({
                    video: { width: 640, height: 480 },
                    audio: false
                });
                cameraPreview.srcObject = cameraStream;
                cameraPreview.style.display = 'block';
                cameraBtn.textContent = 'Detener cámara';
                visionStatusEl.textContent = 'capturing';
                visionErrorEl.textContent = '';

                cameraInterval = setInterval(() => {
                    if (!cameraStream || !ws || ws.readyState !== WebSocket.OPEN) {
                        return;
                    }
                    cameraCtx.drawImage(cameraPreview, 0, 0, cameraCanvas.width, cameraCanvas.height);
                    const imageB64 = cameraCanvas.toDataURL('image/jpeg', 0.65).split(',')[1];
                    ws.send(JSON.stringify({
                        type: 'video_frame',
                        payload: {
                            image_b64: imageB64,
                            frame_format: 'jpeg',
                            width: cameraCanvas.width,
                            height: cameraCanvas.height
                        }
                    }));
                }, 1200);
            } catch (error) {
                visionStatusEl.textContent = 'error';
                visionErrorEl.textContent = `camera open failed: ${error.message || error}`;
            }
        }
        
        function connect() {
            const wsProto = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${wsProto}//${window.location.host}/ws/chat`);
            
            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                
                if (data.type === 'metadata') {
                    // V2.42: Early ethical context — no visual output needed
                    return;
                }

                if (data.type === 'vision_context') {
                    updateVisionState(data.payload);
                    return;
                }

                if (data.type === 'vision_rejected') {
                    visionStatusEl.textContent = 'rejected';
                    visionErrorEl.textContent = `${data?.payload?.code || 'REJECTED'}: ${data?.payload?.message || 'invalid frame'}`;
                    return;
                }

                if (data.type === 'video_contract') {
                    return;
                }

                if (data.type === 'tts_audio') {
                    // V2.49: TTS audio — handled by audio player if present
                    return;
                }

                if (data.type === 'clear_tokens') {
                    // V2.72: Plugin triggered mid-stream — erase partial text
                    if (currentMsgEl) {
                        currentMsgEl.remove();
                        currentMsgEl = null;
                    }
                    return;
                }

                if (data.type === 'auth_required') {
                    const btnHtml = `<button onclick="authorizeVault('${data.vault_key}')" style="margin-top:10px;background:#d29922;color:white;border:none;border-radius:4px;padding:5px 10px;font-weight:bold;">🔐 Autorizar acceso a: ${data.vault_key}</button>`;
                    log.innerHTML += `<div class="message" style="border:1px dashed #d29922; padding:10px; border-radius:5px; background: #21262d; margin-top:10px;">⚠️ Solicitud de Bóveda Segura<br>${btnHtml}</div>`;
                    log.scrollTop = log.scrollHeight;
                    return;
                }

                if (data.type === 'token') {
                    // Streaming: append token to current message
                    if (!currentMsgEl) {
                        currentMsgEl = document.createElement('div');
                        currentMsgEl.className = 'message kernel-msg';
                        currentMsgEl.innerHTML = '<strong>Ethos:</strong> ';
                        log.appendChild(currentMsgEl);
                    }
                    currentMsgEl.innerHTML += data.content;
                    log.scrollTop = log.scrollHeight;
                    return;
                }
                
                if (data.type === 'done') {
                    // Stream finished or blocked message
                    const msgClass = data.blocked ? 'blocked-msg' : 'kernel-msg';
                    const ctxInfo = data.context ? `<span class="context-tag">[${data.context}]</span>` : '';
                    const reasonInfo = data.reason ? `<span class="context-tag">(${data.reason})</span>` : '';
                    const pluginInfo = data.plugin_used ? `<span class="context-tag" style="background:#1f4f3a;color:#3fb950;">🔌 ${data.plugin_used}</span>` : '';

                    if (currentMsgEl && !data.blocked) {
                        // Streaming finished — add context tag to existing element
                        currentMsgEl.innerHTML += ` ${ctxInfo}${pluginInfo}`;
                    } else if (data.message) {
                        // Blocked or non-streamed — create new message
                        log.innerHTML += `<div class="message ${msgClass}"><strong>Ethos:</strong> ${data.message} ${ctxInfo} ${pluginInfo} ${reasonInfo}</div>`;
                    }

                    
                    if (data.vault_key) {
                        const btnHtml = `<button onclick="authorizeVault('${data.vault_key}')" style="margin-top:10px;background:#d29922;color:white;border:none;border-radius:4px;padding:5px 10px;font-weight:bold;">🔐 Autorizar acceso a: ${data.vault_key}</button>`;
                        log.innerHTML += `<div class="message" style="border:1px dashed #d29922; padding:10px; border-radius:5px; background: #21262d; margin-top:10px;">⚠️ Solicitud de Bóveda Segura<br>${btnHtml}</div>`;
                    }
                    
                    currentMsgEl = null;
                    streaming = false;
                    btn.disabled = false;
                    input.disabled = false;
                    log.scrollTop = log.scrollHeight;
                    return;
                }
            };

            ws.onclose = () => {
                log.innerHTML += `<div class="message blocked-msg"><strong>Sistema:</strong> Conexión perdida. Reconectando en 3s...</div>`;
                streaming = false;
                btn.disabled = false;
                input.disabled = false;
                stopDesktopCamera();
                setTimeout(connect, 3000);
            };
        }

        function send() {
            const text = input.value.trim();
            if (!text || ws.readyState !== WebSocket.OPEN || streaming) return;
            
            log.innerHTML += `<div class="message user-msg"><strong>Tú:</strong> ${text}</div>`;
            log.scrollTop = log.scrollHeight;
            ws.send(text);
            input.value = '';
            streaming = true;
            btn.disabled = true;
            input.disabled = true;
        }

        btn.onclick = send;
        input.onkeypress = (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                send();
            }
        };

        cameraBtn.onclick = () => {
            if (cameraStream) {
                stopDesktopCamera();
                return;
            }
            startDesktopCamera().catch((error) => {
                visionStatusEl.textContent = 'error';
                visionErrorEl.textContent = `camera startup failed: ${String(error)}`;
            });
        };

        // Phase 19: Vault Authorization Function
        window.authorizeVault = function(key) {
            if (ws.readyState !== WebSocket.OPEN || streaming) return;
            const payload = JSON.stringify({ type: "vault_auth", key: key, approved: true });
            log.innerHTML += `<div class="message user-msg" style="color: #3fb950;"><strong>Sistema:</strong> 🔐 Autorización concedida para [${key}]. Desencriptando...</div>`;
            log.scrollTop = log.scrollHeight;
            ws.send(payload);
            streaming = true;
            btn.disabled = true;
            input.disabled = true;
        };

        audioCaptureBtn.onclick = () => {
            captureAndSendAudio().catch((error) => {
                updateMicStatus('capture failed (see console)', 'audio-status-err');
                audioLastResult.textContent = `Last transcript: capture failed (${String(error)})`;
                audioCaptureBtn.disabled = false;
            });
        };

        audioFallbackBtn.onclick = () => {
            sendAudioPerceptionEnvelope('', 16000).catch((error) => {
                audioLastResult.textContent = `Last transcript: fallback failed (${String(error)})`;
            });
        };

        initMic().catch(() => {
            micUnavailable = true;
            updateMicStatus('init failed (using fallback)', 'audio-status-err');
            audioCaptureBtn.disabled = true;
        });
        connect();
    </script>
</body>
</html>
