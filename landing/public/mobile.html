<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0d0f14">
  <meta name="description" content="Ethos Kernel — LAN mobile WebSocket chat client">
  <title>Ethos Kernel — Mobile</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0d0f14;
      --surface: #161b24;
      --border:  rgba(255,255,255,0.07);
      --text:    #e2e8f0;
      --muted:   #8892a4;
      --accent:  #38bdf8;
      --green:   #34d399;
      --red:     #f87171;
      --yellow:  #fbbf24;
    }

    html, body { height: 100%; background: var(--bg); color: var(--text); }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex; flex-direction: column;
      max-width: 500px; margin: 0 auto;
      padding: 0 0.25rem;
    }

    header {
      padding: 0.75rem 1rem;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0;
    }
    .header-logo { font-weight: 700; font-size: 1rem; }
    .header-logo span { color: var(--accent); }
    .status-row { display: flex; align-items: center; gap: 0.5rem; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
    .dot.on  { background: var(--green); box-shadow: 0 0 6px var(--green); }
    .dot.err { background: var(--red); }
    #status-text { font-size: 0.78rem; color: var(--muted); }

    /* connect bar */
    .connect-strip {
      padding: 0.5rem 1rem;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex; gap: 0.4rem; align-items: center;
      flex-shrink: 0;
    }
    .connect-strip input {
      flex: 1; min-width: 0;
      padding: 0.4rem 0.65rem;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 6px; color: var(--text); font-size: 0.82rem;
    }
    .btn { padding: 0.4rem 0.8rem; border: none; border-radius: 6px; font-size: 0.82rem; font-weight: 600; cursor: pointer; }
    .btn-p { background: var(--accent); color: #0d0f14; }
    .btn-d { background: var(--red);   color: #fff; }

    /* chat area */
    #chat-log {
      flex: 1; overflow-y: auto;
      padding: 0.75rem 1rem;
      display: flex; flex-direction: column; gap: 0.5rem;
    }
    .bubble {
      max-width: 85%; padding: 0.55rem 0.8rem;
      border-radius: 12px; font-size: 0.88rem; line-height: 1.5;
      word-break: break-word;
    }
    .bubble-user   { align-self: flex-end; background: rgba(56,189,248,0.15); border: 1px solid rgba(56,189,248,0.25); }
    .bubble-kernel { align-self: flex-start; background: var(--surface); border: 1px solid var(--border); }
    .bubble-system { align-self: center; background: transparent; color: var(--muted); font-size: 0.78rem; font-style: italic; border: none; }
    .bubble-label  { font-size: 0.7rem; font-weight: 700; margin-bottom: 0.2rem; color: var(--muted); }
    .bubble-user .bubble-label   { color: var(--accent); }
    .bubble-kernel .bubble-label { color: var(--green); }

    /* quick status strip */
    #status-strip {
      display: flex; gap: 0.5rem; flex-wrap: wrap;
      padding: 0.4rem 1rem;
      background: var(--surface); border-top: 1px solid var(--border);
      font-size: 0.75rem; color: var(--muted);
      flex-shrink: 0;
    }
    .chip {
      display: inline-flex; align-items: center; gap: 0.2rem;
      padding: 0.15rem 0.5rem;
      border-radius: 4px; font-weight: 600;
    }
    .chip-g { background: rgba(52,211,153,0.12); color: var(--green); }
    .chip-r { background: rgba(248,113,113,0.12); color: var(--red); }
    .chip-y { background: rgba(251,191,36,0.12);  color: var(--yellow); }
    .chip-b { background: rgba(56,189,248,0.12);  color: var(--accent); }
    .chip-m { background: rgba(136,146,164,0.1);  color: var(--muted); }

    /* input row */
    .input-row {
      display: flex; gap: 0.4rem; padding: 0.6rem 1rem;
      background: var(--surface); border-top: 1px solid var(--border);
      flex-shrink: 0;
      padding-bottom: max(0.6rem, env(safe-area-inset-bottom, 0.6rem));
    }
    .input-row textarea {
      flex: 1; min-width: 0;
      padding: 0.55rem 0.75rem;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); font-size: 0.9rem;
      font-family: inherit; resize: none; line-height: 1.4;
      max-height: 120px; overflow-y: auto;
    }
    .input-row textarea:focus { outline: none; border-color: var(--accent); }
    .btn-send {
      padding: 0.55rem 1rem;
      background: var(--accent); color: #0d0f14;
      border: none; border-radius: 8px;
      font-size: 0.9rem; font-weight: 700; cursor: pointer;
      transition: opacity 0.15s; align-self: flex-end;
    }
    .btn-send:disabled { opacity: 0.4; cursor: default; }
    .btn-send:not(:disabled):hover { opacity: 0.85; }
  </style>
</head>
<body>

<header>
  <div class="header-logo">Ethos <span>Kernel</span></div>
  <div class="status-row">
    <div class="dot" id="dot"></div>
    <span id="status-text">Disconnected</span>
  </div>
</header>

<div class="connect-strip">
  <input id="ws-url" type="text" value="ws://localhost:8765/ws/chat" autocomplete="off" spellcheck="false">
  <button class="btn btn-p" id="btn-connect">Connect</button>
  <button class="btn btn-d" id="btn-disconnect" disabled>×</button>
</div>

<div id="chat-log">
  <div class="bubble bubble-system">Enter the server URL above and tap Connect</div>
</div>

<div id="status-strip">
  <span class="chip chip-m" id="chip-action">—</span>
  <span class="chip chip-m" id="chip-malabs">gate: —</span>
  <span class="chip chip-m" id="chip-score">score: —</span>
  <span class="chip chip-m" id="chip-turn">turn: —</span>
</div>

<div class="input-row">
  <textarea id="chat-input" rows="1" placeholder="Type a message…" disabled></textarea>
  <button class="btn-send" id="btn-send" disabled>↑</button>
</div>

<script>
let ws = null;

function connect() {
  const url = document.getElementById('ws-url').value.trim();
  if (!url) return;
  ws = new WebSocket(url);
  ws.onopen  = () => { setConn(true); addMsg('system','🟢 Connected'); };
  ws.onclose = () => { setConn(false); addMsg('system','🔴 Disconnected'); ws = null; };
  ws.onerror = () => addMsg('system','⚠️ Connection error');
  ws.onmessage = ev => {
    try { handle(JSON.parse(ev.data)); }
    catch(e) { addMsg('system','Parse error: ' + e.message); }
  };
}

function disconnect() { if (ws) { ws.close(); ws = null; } }

function setConn(on) {
  document.getElementById('dot').className         = 'dot ' + (on ? 'on' : '');
  document.getElementById('status-text').textContent = on ? 'Connected' : 'Disconnected';
  document.getElementById('btn-connect').disabled    = on;
  document.getElementById('btn-disconnect').disabled = !on;
  document.getElementById('chat-input').disabled     = !on;
  document.getElementById('btn-send').disabled       = !on;
}

function handle(data) {
  const verbal = data.verbal ?? data.communication ?? data.response;
  if (verbal) addMsg('kernel', verbal);

  const action  = data.action ?? data.final_action ?? '—';
  const blocked = data.blocked ?? (data.malabs_result === 'block');
  const score   = data.score ?? data.ethical_score;
  const turn    = data.temporal_context?.turn_index ?? data.turn_index;

  const chipAction = document.getElementById('chip-action');
  chipAction.className = 'chip chip-b';
  chipAction.textContent = String(action).slice(0, 18);

  const chipMalabs = document.getElementById('chip-malabs');
  chipMalabs.className = 'chip ' + (blocked ? 'chip-r' : 'chip-g');
  chipMalabs.textContent = 'gate: ' + (blocked ? 'BLOCK' : 'OK');

  const chipScore = document.getElementById('chip-score');
  if (score != null) {
    const v = parseFloat(score);
    chipScore.className = 'chip ' + (v > 0.6 ? 'chip-g' : v > 0.35 ? 'chip-y' : 'chip-r');
    chipScore.textContent = 'score: ' + v.toFixed(2);
  }

  if (turn != null) {
    const chipTurn = document.getElementById('chip-turn');
    chipTurn.className = 'chip chip-m';
    chipTurn.textContent = 'turn: ' + turn;
  }
}

function addMsg(type, text) {
  const log = document.getElementById('chat-log');
  const bubble = document.createElement('div');
  bubble.className = 'bubble bubble-' + type;
  if (type !== 'system') {
    const lbl = document.createElement('div');
    lbl.className = 'bubble-label';
    lbl.textContent = type === 'user' ? 'You' : 'Kernel';
    bubble.appendChild(lbl);
  }
  const txt = document.createElement('div');
  txt.textContent = text;
  bubble.appendChild(txt);
  log.appendChild(bubble);
  log.scrollTop = log.scrollHeight;
}

function sendMsg() {
  const ta   = document.getElementById('chat-input');
  const text = ta.value.trim();
  if (!text || !ws || ws.readyState !== 1) return;
  ws.send(JSON.stringify({ text }));
  addMsg('user', text);
  ta.value = '';
  ta.style.height = '';
}

document.getElementById('btn-connect').addEventListener('click', connect);
document.getElementById('btn-disconnect').addEventListener('click', disconnect);
document.getElementById('btn-send').addEventListener('click', sendMsg);

const ta = document.getElementById('chat-input');
ta.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
});
ta.addEventListener('input', () => {
  ta.style.height = '';
  ta.style.height = Math.min(ta.scrollHeight, 120) + 'px';
});
</script>
</body>
</html>
