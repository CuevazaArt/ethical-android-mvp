name: Question
description: Ask about the model, methods, simulations, or repository
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for engaging. Please check [README](https://github.com/CuevazaArt/ethical-android-mvp/blob/main/README.md) and [CHANGELOG](https://github.com/CuevazaArt/ethical-android-mvp/blob/main/CHANGELOG.md) first when relevant.
  - type: textarea
    id: question
    attributes:
      label: Your question
      description: Be specific; link to docs or code when possible.
    validations:
      required: true
