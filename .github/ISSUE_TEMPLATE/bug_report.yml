name: Bug report
description: Something broken in code, tests, dashboard, or the Next.js landing
labels: ["bug"]
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Python kernel / simulations
        - Tests
        - dashboard.html
        - landing (Next.js site)
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment (OS, Python or Node version, browser if UI)
  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots (optional)
