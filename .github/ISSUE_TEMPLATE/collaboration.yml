name: Funding, partnership, or press
description: Grants, labs, media, or institutional collaboration — structured first contact
title: "[Partnership] "
labels: ["partnership"]
body:
  - type: markdown
    attributes:
      value: |
        Use this template for **serious** outreach (funding, collaboration, press). It keeps threads scannable and protects maintainers from drive-by noise. For general questions, use **Question** instead.
  - type: dropdown
    id: reason
    attributes:
      label: Reason for contact
      options:
        - Grant or philanthropic funding
        - Academic or lab collaboration
        - Media or interview
        - Corporate partnership or pilot
        - Other (describe below)
    validations:
      required: true
  - type: input
    id: org
    attributes:
      label: Organization or outlet
      description: Optional but helps us respond.
  - type: textarea
    id: goals
    attributes:
      label: What you are looking for
      description: Scope, timeline, constraints, and how this project fits your goals.
    validations:
      required: true
  - type: textarea
    id: links
    attributes:
      label: Links (optional)
      description: Program pages, RFPs, prior work, or your public profile.
  - type: checkboxes
    id: ack
    attributes:
      label: Acknowledgment
      options:
        - label: I have read the README and understand this is a research prototype, not a certified safety or clinical product.
          required: true
