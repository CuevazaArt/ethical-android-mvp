# Next.js landing: lint + production build. Does not gate Python CI; runs on landing changes.
name: Landing CI

on:
  push:
    branches: [main]
    paths:
      - "landing/**"
      - ".github/workflows/landing-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "landing/**"
      - ".github/workflows/landing-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  landing:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: landing

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: landing/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Production build
        run: npm run build
