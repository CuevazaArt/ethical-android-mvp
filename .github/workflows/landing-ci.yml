# Next.js landing: robots parity, kernel metadata drift, lint + production build.
# Does not gate Python CI; runs on landing, SEO, or version-source changes.
name: Landing CI

on:
  push:
    branches: [main]
    paths:
      - "landing/**"
      - "pyproject.toml"
      - "robots.txt"
      - ".github/workflows/landing-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "landing/**"
      - "pyproject.toml"
      - "robots.txt"
      - ".github/workflows/landing-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  landing:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: landing

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: landing/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Verify robots.txt vs Next robots.ts
        run: npm run check-robots

      - name: Verify kernel metadata file matches pyproject + package.json
        run: |
          npm run sync-kernel-meta
          git diff --exit-code src/config/kernelRepo.json || (
            echo "Drift: run 'cd landing && npm run sync-kernel-meta' and commit src/config/kernelRepo.json"
            exit 1
          )

      - name: ESLint
        run: npm run lint

      - name: Production build
        run: npm run build
