# Quality gate: same dependency pins as local dev (requirements.txt + requirements-dev.txt).
# Runs on pushes and PRs to main and master-* integration hubs; matches local checks + optional pre-commit (see CONTRIBUTING.md).
# Full test suite: `pytest tests/` with `CI=1`, `KERNEL_IGNORE_BOOT_FAILURE=1` for CI/agent hosts
# where kernel secure-boot checks may lag during collection.
#
# Parity: job `quality` (Ubuntu matrix 3.11+3.12) runs the **entire** `tests/` tree with coverage;
# job `windows-smoke` runs the same `pytest tests/` command on Windows. Job `ci-all-passed`
# aggregates success so one branch-protection check shows “all tests + lint + mypy + compose” green.
name: CI

# workflow_dispatch: same jobs as push/PR — full `pytest tests/` (quality + windows-smoke),
# ruff, ruff format, mypy, compose-validate, semantic-default-contract. Use Actions tab → CI → Run workflow.
on:
  push:
    branches: [main, "master-*"]
  pull_request:
    branches: [main, "master-*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  compose-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate Docker Compose merges
        run: |
          set -euo pipefail
          cp .env.example .env
          docker compose -f docker-compose.yml -f docker-compose.prodish.yml config --quiet
          docker compose -f docker-compose.yml -f docker-compose.prodish.yml -f docker-compose.metrics.yml config --quiet
          docker compose -f docker-compose.yml -f docker-compose.metrics.yml config --quiet
          docker compose -f docker-compose.yml -f docker-compose.prodish.yml --profile llm config --quiet

  quality:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
          pip freeze

      - name: Ruff lint
        run: python -m ruff check src tests

      - name: Ruff format
        run: python -m ruff format --check src tests

      - name: Mypy
        run: python -m mypy src

      - name: Pytest collection gate
        env:
          CI: "true"
          PYTHONHASHSEED: "0"
          KERNEL_IGNORE_BOOT_FAILURE: "1"
        run: python -m pytest tests/ --collect-only -q

      - name: Pytest with coverage
        env:
          CI: "true"
          PYTHONHASHSEED: "0"
          KERNEL_IGNORE_BOOT_FAILURE: "1"
        run: |
          python -m pytest tests/ -q --tb=short \
            --junitxml=junit.xml \
            --cov=src \
            --cov-fail-under=65 \
            --cov-report=xml \
            --cov-report=term-missing

      - name: Upload JUnit
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: junit-py${{ matrix.python-version }}
          path: junit.xml
          if-no-files-found: ignore

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.12'
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  semantic-default-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Semantic defaults + empirical pilot (Issue 3) contract tests
        env:
          CI: "true"
          PYTHONHASHSEED: "0"
          KERNEL_IGNORE_BOOT_FAILURE: "1"
        run: |
          python -m pytest tests/test_malabs_semantic_integration.py tests/test_semantic_chat_gate.py tests/test_empirical_pilot_runner.py -q --tb=short

  windows-smoke:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Ruff lint smoke
        run: python -m ruff check src tests

      - name: Full test suite (parity with Ubuntu quality job)
        env:
          CI: "true"
          PYTHONHASHSEED: "0"
          KERNEL_IGNORE_BOOT_FAILURE: "1"
        run: python -m pytest tests/ -q --tb=short --junitxml=junit-windows.xml --cov=src --cov-fail-under=65 --cov-report=xml --cov-report=term-missing

      - name: Upload JUnit (Windows)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: junit-windows
          path: junit-windows.xml
          if-no-files-found: ignore

  # Single green check: compose + full pytest tests/ (Ubuntu×2 + Ruff + Mypy) + semantic slice + Windows parity
  ci-all-passed:
    name: All CI checks passed
    runs-on: ubuntu-latest
    needs:
      - compose-validate
      - quality
      - semantic-default-contract
      - windows-smoke
    if: ${{ success() }}
    steps:
      - name: Gate
        run: |
          echo "All checks succeeded: Docker Compose validate, quality (ruff + ruff format + mypy + pytest tests/ with coverage on Python 3.11/3.12), semantic MalAbs contract suite, Windows full pytest tests/ parity."
