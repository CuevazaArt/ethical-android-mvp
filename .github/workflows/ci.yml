# Quality gate: same dependency pins as local dev (requirements.txt + requirements-dev.txt).
# Runs on pushes and PRs to main; matches local checks + optional pre-commit (see CONTRIBUTING.md).
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  compose-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate Docker Compose merges
        run: |
          set -euo pipefail
          cp .env.example .env
          docker compose -f docker-compose.yml -f docker-compose.prodish.yml config --quiet
          docker compose -f docker-compose.yml -f docker-compose.prodish.yml -f docker-compose.metrics.yml config --quiet
          docker compose -f docker-compose.yml -f docker-compose.metrics.yml config --quiet
          docker compose -f docker-compose.yml -f docker-compose.prodish.yml --profile llm config --quiet

  quality:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
          pip freeze

      - name: Ruff lint
        run: python -m ruff check src tests

      - name: Ruff format
        run: python -m ruff format --check src tests

      - name: Mypy
        run: python -m mypy src

      - name: Pytest with coverage
        env:
          PYTHONHASHSEED: "0"
        run: |
          python -m pytest tests/ -q --tb=short \
            --junitxml=junit.xml \
            --cov=src \
            --cov-fail-under=75 \
            --cov-report=xml \
            --cov-report=term-missing

      - name: Upload JUnit
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: junit-py${{ matrix.python-version }}
          path: junit.xml
          if-no-files-found: ignore

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.12'
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  semantic-default-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Semantic defaults + empirical pilot (Issue 3) contract tests
        env:
          PYTHONHASHSEED: "0"
        run: |
          python -m pytest tests/test_malabs_semantic_integration.py tests/test_semantic_chat_gate.py tests/test_empirical_pilot_runner.py -q --tb=short

  windows-smoke:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Ruff lint smoke
        run: python -m ruff check src tests

      - name: Runtime profile smoke tests
        env:
          PYTHONHASHSEED: "0"
        run: |
          python -m pytest tests/test_runtime_profiles.py tests/test_env_policy.py -q --tb=short

  anti-sycophancy-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Generate RLHF Dataset
        run: python scripts/generate_prosody_dataset.py

      - name: Run Qualitative Audit (LLM-as-a-Judge)
        run: python scripts/validate_anti_sycophancy.py

  secure-boot-integrity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Validate Cryptographic Manifest
        env:
          PYTHONHASHSEED: "0"
          KERNEL_NOMAD_SECRET: "ci_pipeline_secret_xyz"
        run: |
          python scripts/generate_golden_manifest.py
          python -c "import sys; from src.modules.secure_boot import SecureBoot; sys.exit(0 if SecureBoot().verify_integrity() else 1)"

  concurrency-stress:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Async Chat and Concurrent Persistence Stress Tests
        env:
          PYTHONHASHSEED: "0"
        run: |
          python -m pytest tests/test_concurrent_persistence.py tests/test_charm_engine.py -q --tb=short
