# Quality gate: same dependency pins as local dev (requirements.txt + requirements-dev.txt).
# Runs on pushes and PRs to main; matches local checks + optional pre-commit (see CONTRIBUTING.md).
# Manual run: `gh workflow run CI --ref main`
#
# CI ECONOMY POLICY (Directive 2026-04-28, L0-approved):
#   - Expensive jobs (quality matrix, windows-smoke) SKIP when only docs/assets change.
#   - compose-validate ALWAYS runs (cheap, <1 min).
#   - Tags do NOT trigger CI.
#   - See CONTRIBUTING.md § CI Economy for full policy.
name: CI

on:
  push:
    branches: [main, "master-*", "feature-*"]
    tags-ignore: ['**']
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "15 14 * * *" # Daily cadence for gate freshness audit (UTC)

permissions:
  contents: read

jobs:
  # ── Change Detection ────────────────────────────────────────────────
  # Determines whether source code changed. Docs-only pushes skip tests.
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      python_changed: ${{ steps.filter.outputs.python }}
      flutter_changed: ${{ steps.filter.outputs.flutter }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            python:
              - 'src/**/*.py'
              - 'tests/**/*.py'
              - 'scripts/**'
              - 'requirements*.txt'
              - 'pyproject.toml'
              - 'Dockerfile*'
              - 'docker-compose*.yml'
              - '.github/workflows/**'
              - 'config/**'
            flutter:
              - 'src/clients/flutter_desktop_shell/**'

  # ── Docker Compose Validation (ALWAYS) ──────────────────────────────
  # Cheap (<1 min). Catches YAML merge errors early.
  compose-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate Docker Compose merges
        run: |
          set -euo pipefail
          cp .env.example .env
          docker compose -f docker-compose.yml -f docker-compose.prodish.yml config --quiet
          docker compose -f docker-compose.yml -f docker-compose.prodish.yml -f docker-compose.metrics.yml config --quiet
          docker compose -f docker-compose.yml -f docker-compose.metrics.yml config --quiet
          docker compose -f docker-compose.yml -f docker-compose.prodish.yml --profile llm config --quiet

  # ── Quality Gate (CONDITIONAL) ──────────────────────────────────────
  # Skips when only docs/assets changed. Always runs on PRs and manual dispatch.
  quality:
    name: quality (Python ${{ matrix.python-version }})
    needs: detect-changes
    if: |
      needs.detect-changes.outputs.python_changed == 'true'
      || github.event_name == 'pull_request'
      || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
          pip freeze

      - name: L1 collaboration invariants
        run: python scripts/eval/verify_collaboration_invariants.py

      - name: Ruff lint
        run: python -m ruff check src tests

      - name: Ruff format
        run: python -m ruff format --check src tests

      - name: Mypy
        run: python -m mypy src

      - name: Pytest with coverage
        env:
          PYTHONHASHSEED: "0"
        run: |
          python -m pytest tests/ -n auto -q --tb=short \
            --junitxml=junit.xml \
            --cov=src \
            --cov-fail-under=65 \
            --cov-report=xml \
            --cov-report=term-missing

      - name: Upload JUnit
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: junit-py${{ matrix.python-version }}
          path: junit.xml
          if-no-files-found: ignore

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.12'
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  # ── Windows Smoke (CONDITIONAL) ─────────────────────────────────────
  # Skips when only docs/assets changed. Always runs on PRs and manual dispatch.
  windows-smoke:
    needs: detect-changes
    if: |
      needs.detect-changes.outputs.python_changed == 'true'
      || github.event_name == 'pull_request'
      || github.event_name == 'workflow_dispatch'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: L1 collaboration invariants
        run: python scripts/eval/verify_collaboration_invariants.py

      - name: Ruff lint
        run: python -m ruff check src tests

      - name: Ruff format
        run: python -m ruff format --check src tests

      - name: Mypy
        run: python -m mypy src

      - name: Pytest core (Windows smoke)
        env:
          PYTHONHASHSEED: "0"
        run: python -m pytest tests/core/ -q --tb=short

  # ── Desktop Re-entry Gate Report (CONDITIONAL) ──────────────────────
  # Produces auditable artifacts for G1/G2/G4 from versioned evidence.
  desktop-gate-report:
    needs: detect-changes
    if: |
      needs.detect-changes.outputs.python_changed == 'true'
      || github.event_name == 'pull_request'
      || github.event_name == 'workflow_dispatch'
      || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Desktop MVP status contract smoke
        run: python -m pytest tests/server/test_app_integration.py::test_desktop_mvp_status_contract_smoke -q --tb=short

      - name: Generate re-entry gate reports
        run: |
          set -euo pipefail
          mkdir -p gate-reports
          python scripts/eval/desktop_gate_runner.py stability --ledger docs/collaboration/evidence/DESKTOP_STABILITY_LEDGER.jsonl --days 14 > gate-reports/g1-stability.json
          python scripts/eval/desktop_gate_runner.py latency --samples docs/collaboration/evidence/VOICE_TURN_LATENCY_SAMPLES.jsonl --target-p95-ms 2500 > gate-reports/g2-latency.json
          python scripts/eval/desktop_gate_runner.py demo --checklist docs/collaboration/evidence/DEMO_RELIABILITY_CHECKLIST.json --required-count 10 > gate-reports/g4-demo.json
          python scripts/eval/desktop_gate_runner.py snapshot --evidence-dir docs/collaboration/evidence > gate-reports/reentry-gates-snapshot.json
          python scripts/eval/freeze_lane_monthly_report.py --allow-in-progress > gate-reports/g3-monthly-report.json

      - name: Enforce freshness SLA
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          snapshot = json.loads(Path("gate-reports/reentry-gates-snapshot.json").read_text(encoding="utf-8"))
          gates = snapshot.get("gates", {})
          stale = [gate for gate, details in gates.items() if details.get("stale") is True]
          if stale:
            raise SystemExit(f"Freshness SLA violation in gates: {', '.join(sorted(stale))}")
          print("Freshness SLA check: PASS")
          PY

      - name: Publish gate summary
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          snapshot = json.loads(Path("gate-reports/reentry-gates-snapshot.json").read_text(encoding="utf-8"))
          gates = snapshot.get("gates", {})
          lines = [
              "## Desktop Re-entry Gate Report",
              "",
              "| Gate | Status | Updated At | Source | Summary |",
              "|---|---|---|---|---|",
          ]
          for gate in ("G1", "G2", "G3", "G4", "G5"):
              row = gates.get(gate, {})
              status = str(row.get("status", "unknown")).upper()
              updated_at = row.get("updated_at") or "n/a"
              source = row.get("source") or "n/a"
              summary = row.get("summary") or "n/a"
              lines.append(f"| {gate} | {status} | {updated_at} | {source} | {summary} |")
          summary_file = os.environ.get("GITHUB_STEP_SUMMARY")
          if summary_file:
              Path(summary_file).write_text("\n".join(lines) + "\n", encoding="utf-8")
          else:
              print("\n".join(lines))
          PY

      - name: Upload gate report artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: desktop-gate-report
          path: gate-reports/
          if-no-files-found: error

  # ── Flutter Desktop Smoke (CONDITIONAL) ──────────────────────────────
  flutter-desktop-smoke:
    needs: detect-changes
    if: |
      needs.detect-changes.outputs.flutter_changed == 'true'
      || github.event_name == 'pull_request'
      || github.event_name == 'workflow_dispatch'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Flutter test (desktop shell)
        working-directory: src/clients/flutter_desktop_shell
        run: |
          flutter pub get
          flutter test

