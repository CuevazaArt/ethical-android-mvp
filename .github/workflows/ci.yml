# Quality gate: same dependency pins as local dev (requirements.txt + requirements-dev.txt).
# Runs on pushes and PRs to main; matches local checks + optional pre-commit (see CONTRIBUTING.md).
# Manual run: `gh workflow run CI --ref main`
#
# CI ECONOMY POLICY (Directive 2026-04-28, L0-approved):
#   - Expensive jobs (quality matrix, windows-smoke) SKIP when only docs/assets change.
#   - compose-validate ALWAYS runs (cheap, <1 min).
#   - Tags do NOT trigger CI.
#   - See CONTRIBUTING.md § CI Economy for full policy.
name: CI

on:
  push:
    branches: [main, "master-*", "feature-*"]
    tags-ignore: ['**']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ── Change Detection ────────────────────────────────────────────────
  # Determines whether source code changed. Docs-only pushes skip tests.
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      code_changed: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - 'src/**'
              - 'tests/**'
              - 'scripts/**'
              - 'requirements*.txt'
              - 'pyproject.toml'
              - 'Dockerfile*'
              - 'docker-compose*.yml'
              - '.github/workflows/**'
              - 'config/**'

  # ── Docker Compose Validation (ALWAYS) ──────────────────────────────
  # Cheap (<1 min). Catches YAML merge errors early.
  compose-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate Docker Compose merges
        run: |
          set -euo pipefail
          cp .env.example .env
          docker compose -f docker-compose.yml -f docker-compose.prodish.yml config --quiet
          docker compose -f docker-compose.yml -f docker-compose.prodish.yml -f docker-compose.metrics.yml config --quiet
          docker compose -f docker-compose.yml -f docker-compose.metrics.yml config --quiet
          docker compose -f docker-compose.yml -f docker-compose.prodish.yml --profile llm config --quiet

  # ── Quality Gate (CONDITIONAL) ──────────────────────────────────────
  # Skips when only docs/assets changed. Always runs on PRs and manual dispatch.
  quality:
    name: quality (Python ${{ matrix.python-version }})
    needs: detect-changes
    if: |
      needs.detect-changes.outputs.code_changed == 'true'
      || github.event_name == 'pull_request'
      || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
          pip freeze

      - name: L1 collaboration invariants
        run: python scripts/eval/verify_collaboration_invariants.py

      - name: Ruff lint
        run: python -m ruff check src tests

      - name: Ruff format
        run: python -m ruff format --check src tests

      - name: Mypy
        run: python -m mypy src

      - name: Pytest with coverage
        env:
          PYTHONHASHSEED: "0"
        run: |
          python -m pytest tests/ -n auto -q --tb=short \
            --junitxml=junit.xml \
            --cov=src \
            --cov-fail-under=65 \
            --cov-report=xml \
            --cov-report=term-missing

      - name: Upload JUnit
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: junit-py${{ matrix.python-version }}
          path: junit.xml
          if-no-files-found: ignore

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.12'
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  # ── Windows Smoke (CONDITIONAL) ─────────────────────────────────────
  # Skips when only docs/assets changed. Always runs on PRs and manual dispatch.
  windows-smoke:
    needs: detect-changes
    if: |
      needs.detect-changes.outputs.code_changed == 'true'
      || github.event_name == 'pull_request'
      || github.event_name == 'workflow_dispatch'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: L1 collaboration invariants
        run: python scripts/eval/verify_collaboration_invariants.py

      - name: Ruff lint
        run: python -m ruff check src tests

      - name: Ruff format
        run: python -m ruff format --check src tests

      - name: Mypy
        run: python -m mypy src

      - name: Pytest core (Windows smoke)
        env:
          PYTHONHASHSEED: "0"
        run: python -m pytest tests/core/ -q --tb=short

