name: Wiki Sync

on:
  push:
    branches:
      - main
      - "master-*"
    paths:
      - "docs/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  wiki-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Repo
        uses: actions/checkout@v4
        with:
          path: repo

      - name: Checkout Wiki Repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}.wiki
          path: wiki
          # Using GITHUB_TOKEN. Note: some orgs/repos require a PAT for wiki push.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync Documents
        run: |
          # 1. Clean up target wiki (optional, depends on if we want to delete old docs)
          # For now, we overlay to avoid accidental data loss of wiki-only pages.
          
          # 2. Copy everything from docs/ to wiki/
          # -r: recursive
          # -v: verbose
          cp -rv repo/docs/* wiki/
          
          # 3. Export Executive Summary to Home.md (Tarea W.1.1)
          SOURCE_SUMMARY="repo/docs/proposals/WIKI_EXECUTIVE_SUMMARY_NOMADIC_VISION.md"
          if [ -f "$SOURCE_SUMMARY" ]; then
             cp -v "$SOURCE_SUMMARY" wiki/Home.md
             echo "Exported Executive Summary to Home.md"
          else
             echo "Warning: WIKI_EXECUTIVE_SUMMARY_NOMADIC_VISION.md not found in docs/proposals/"
          fi

      - name: Commit and Push to Wiki
        working-directory: wiki
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Relay: Auto-sync docs from main repo (${{ github.sha }}) (Boy Scout Sync)"
            # GitHub Wikis usually use 'master' or 'main'. We try both.
            git push origin HEAD || git push origin master || git push origin main
          fi
