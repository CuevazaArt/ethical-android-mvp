# Prometheus alerting rules (starter) — load via prometheus.yml rule_files.
#
# Tuning: raise ``for`` / thresholds for your traffic baseline; MalAbs blocks include
# legitimate safety stops, not only attacks.
#
# Metrics require KERNEL_METRICS=1 and a scrape of /metrics (e.g. chat server :8765).

groups:
  - name: ethos_kernel_malabs
    interval: 30s
    rules:
      - alert: EthosMalabsBlocksBurst
        expr: sum(rate(ethos_kernel_malabs_blocks_total[1m])) > 5
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High MalAbs block rate (possible injection or jailbreak surge)"
          description: >-
            Aggregated MalAbs blocks exceed 5/s over 1m for 2m. Inspect ``reason`` label
            (e.g. safety_block) and application logs.

      - alert: EthosSafetyBlockElevated
        expr: sum(rate(ethos_kernel_malabs_blocks_total{reason="safety_block"}[1m])) > 2
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Elevated chat safety_block rate"
          description: >-
            Lexical/semantic MalAbs chat gate is blocking faster than the baseline. Review
            prompts, MalAbs lists, and client traffic for abuse patterns.

      - alert: EthosPerceptionCircuitTrip
        expr: increase(ethos_kernel_perception_circuit_trips_total[10m]) > 0
        for: 0m
        labels:
          severity: info
        annotations:
          summary: "Perception metacognitive doubt circuit tripped"
          description: >-
            Repeated stressed perception parses triggered metacognitive doubt (see perception_circuit.py).
