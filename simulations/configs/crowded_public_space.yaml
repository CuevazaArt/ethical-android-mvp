scenario_name: "Crowd Interaction Public Space"
id: "SCN-A"
description: "Detección de peatones y evasión con registro en DAO"

environment:
  human_agents: 20
  lighting_variability: 0.3
  background_noise_db: 55
  mobile_obstacles: 2

goals:
  destination: [100.0, 50.0]
  safe_stop_threshold_m: 1.5

thresholds:
  max_latency_ms: 150
  max_escalation_rate: 0.02
  anchoring_timeout_s: 5

policies:
  local_fallback: "safe_stop"
  dao_escalation: "active"
